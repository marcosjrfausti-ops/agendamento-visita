<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gestão de Agendamentos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
  <style>
    body { background-color: #f3f4f6; font-family: 'Poppins', sans-serif; overscroll-behavior-y: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .vertical-text { writing-mode: vertical-rl; transform: rotate(180deg); }
    input.uppercase-input { text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="min-h-screen max-w-md mx-auto bg-gray-50 flex flex-col shadow-2xl">
    <div id="global-header" class="hidden bg-white border-b px-4 py-4 flex items-center sticky top-0 z-40 shadow-sm">
      <button onclick="app.showScreen('home')" class="p-2 -ml-2"><i data-lucide="arrow-left"></i></button>
      <h2 id="header-title" class="text-red-600 font-bold text-lg text-center flex-1"></h2>
    </div>
    <div class="flex-1 overflow-y-auto hide-scrollbar" id="main-content">
      <div id="screen-home" class="screen h-full p-6 flex flex-col justify-center space-y-6">
        <div class="text-center"><h2 class="text-red-600 font-bold text-3xl">Painel</h2></div>
        <div class="grid gap-4">
          <button onclick="app.showScreen('acompanhante')" class="bg-white p-5 rounded-2xl shadow-sm border flex items-center space-x-4"><i data-lucide="users" class="text-red-600"></i><span>Acompanhante</span></button>
          <button onclick="app.showScreen('transferencia')" class="bg-white p-5 rounded-2xl shadow-sm border flex items-center space-x-4"><i data-lucide="arrow-right-left" class="text-blue-600"></i><span>Transferência</span></button>
          <button onclick="app.showScreen('visualizar')" class="bg-white p-5 rounded-2xl shadow-sm border flex items-center space-x-4"><i data-lucide="calendar-days" class="text-amber-600"></i><span>Visualizar</span></button>
          <button onclick="app.showScreen('alterar')" class="bg-white p-5 rounded-2xl shadow-sm border flex items-center space-x-4"><i data-lucide="edit" class="text-emerald-600"></i><span>Alterar</span></button>
        </div>
      </div>
      <div id="screen-acompanhante" class="screen hidden p-4 space-y-4"> </div>
      <div id="screen-transferencia" class="screen hidden p-4 space-y-4"> </div>
      <div id="screen-visualizar" class="screen hidden bg-white"> </div>
      <div id="screen-alterar" class="screen hidden p-4 space-y-4"> </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, initializeFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    window.app = {};
    const state = { records: [], baseDateAcomp: new Date(), baseDateTransf: new Date(), weekStart: getMonday(new Date()) };

    function getMonday(d) { const date = new Date(d); const day = date.getDay(); const diff = date.getDate() - day + (day === 0 ? -6 : 1); return new Date(date.getFullYear(), date.getMonth(), diff); }
    function getFormatDateStr(dateObj) { return dateObj.toISOString().split('T')[0]; }
    function formatShortDate(dateStr) { const [y, m, d] = dateStr.split('-'); const days = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb']; return `${days[new Date(y, m-1, d).getDay()]}, ${d}/${m}`; }

    // Lógica principal de ordenação cronológica
    function getRecordDate(r) { return new Date(r.type === 'acompanhante' ? `${r.startDate}T${r.startTime}:00` : `${r.date}T${r.horario}:00`).getTime(); }

    // Renderização do PDF com Tabela
    window.app.generatePDF = async () => {
      const body = [[{text: 'Hora', bold: true}, ...Array.from({length: 7}).map((_,i) => { let d = new Date(state.weekStart); d.setDate(d.getDate()+i); return {text: `${d.getDate()}/${d.getMonth()+1}`, bold: true}})]];
      
      for(let h=6; h<=22; h++) {
        let row = [{text: `${h}h`, bold: true}];
        for(let i=0; i<7; i++) {
          let d = new Date(state.weekStart); d.setDate(d.getDate()+i);
          let dateStr = getFormatDateStr(d);
          let ev = state.records.filter(r => (r.type === 'acompanhante' ? r.startDate : r.date) === dateStr && parseInt((r.type==='acompanhante'?r.startTime:r.horario).split(':')[0]) === h);
          row.push({text: ev.map(e => e.acompanhante || e.visita).join('\n'), fontSize: 8});
        }
        body.push(row);
      }

      const docDef = {
        content: [
          { text: 'RELATÓRIO DE AGENDAMENTOS', style: 'header' },
          { table: { widths: ['auto', '*', '*', '*', '*', '*', '*', '*'], body: body } }
        ]
      };
      pdfMake.createPdf(docDef).download('agenda.pdf');
    };

    // ... (restante da lógica de renderização mantendo a nova ordenação e estilo de horas) ...
  </script>
</body>
</html>
