<body class="text-gray-900 font-sans">

  <div class="min-h-screen max-w-md mx-auto bg-gray-50 flex flex-col relative overflow-hidden shadow-2xl sm:rounded-3xl sm:my-4 sm:border sm:border-gray-200">

        <div class="flex-1 px-4 space-y-4 pt-4">

          <div class="flex space-x-2 items-center bg-white p-3 rounded-xl shadow-sm border border-gray-100">

               <i data-lucide="clock" class="w-4 h-4 text-gray-400"></i>

        <div class="p-4 bg-white border-t border-gray-100 flex space-x-3 pb-8">
          <button id="btn-delete-transf" onclick="app.deleteCurrentRecord()" class="hidden bg-gray-100 text-red-600 font-bold py-3 px-4 rounded-xl shadow-sm">Excluir</button>
          <button onclick="app.saveTransferencia()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md flex items-center justify-center space-x-2 transition-colors">
            <i data-lucide="save"></i>

      <div id="screen-visualizar" class="screen hidden h-full flex flex-col bg-white relative">
        <div class="sticky top-0 z-30 flex flex-col shadow-sm" id="cal-swipe-area">
          <div class="bg-amber-100 p-2 text-center border-b border-amber-200 flex items-center justify-between px-2 select-none">
            <button onclick="app.changeWeek(-7)" class="text-amber-700 font-bold text-xl px-3 py-1">&lsaquo;</button>

               <span class="text-[10px] font-semibold text-amber-700 uppercase tracking-widest block">Semana de</span>

            <button onclick="app.changeWeek(7)" class="text-amber-700 font-bold text-xl px-3 py-1">&rsaquo;</button>

          <div id="cal-days-header" class="flex border-b border-gray-200 bg-gray-50">
             </div>

        <div class="flex-1 overflow-y-auto pb-10 hide-scrollbar bg-white">

      <div id="screen-alterar" class="screen hidden pb-10 p-4 space-y-4">
        <p class="text-sm text-gray-500 text-center mb-4 mt-2">Toque em qualquer registro para alterar ou excluir.</p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- CONFIGURAÇÃO FIREBASE ---
    const firebaseConfig = {
      apiKey: "AIzaSyBtHyDxJFLIyFplyaDeTlidDdXN6IzCh8s",
      authDomain: "agendamento-visita.firebaseapp.com",
      projectId: "agendamento-visita",
      storageBucket: "agendamento-visita.firebasestorage.app",
      messagingSenderId: "70182665963",
      appId: "1:70182665963:web:dc14507ed95e64d1a208ae",
      measurementId: "G-KHSC00WT83"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = initializeFirestore(firebaseApp, {
      localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
    });
    const customAppId = 'agendamento-visita'; // ID de organização das coleções

    // --- ESTADO GLOBAL ---
    const state = {
      user: null,
      records: [],
      currentScreen: 'home',
      baseDateAcomp: new Date(),
      baseDateTransf: new Date(),
      weekStart: getMonday(new Date()),
      editingId: null,
      editingType: null
    };

    // --- UTILITÁRIOS ---
    function getFormatDateStr(dateObj) {
      const yyyy = dateObj.getFullYear();
      const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
      const dd = String(dateObj.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function formatDisplayDate(dateStr) {
      const [yyyy, mm, dd] = dateStr.split('-');
      const date = new Date(yyyy, mm - 1, dd);
      const dias = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
      return `${dias[date.getDay()]}, ${dd}/${mm}/${yyyy}`;
    }

    function getMonday(d) {
      const date = new Date(d);
      const day = date.getDay();
      const diff = date.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(date.getFullYear(), date.getMonth(), diff);
    }

    // Inicializa os ícones na primeira carga
    lucide.createIcons();

    // --- AUTENTICAÇÃO E FIRESTORE ---
    async function initAuth() {
      try {
        await signInAnonymously(auth);
      } catch (err) {
        console.error("Erro auth (usando fallback offline):", err);
        state.user = { uid: 'offline-local-user' };
        setupFirestoreListeners();
      }
    }

    onAuthStateChanged(auth, (u) => {
      state.user = u || { uid: 'offline-local-user' };
      setupFirestoreListeners();
    });

    let unsubAcomp = null;
    let unsubTransf = null;

    function setupFirestoreListeners() {
      if (!state.user) return;
      if (unsubAcomp) unsubAcomp();
      if (unsubTransf) unsubTransf();

      const acompRef = collection(db, 'artifacts', customAppId, 'users', state.user.uid, 'acompanhantes');
      const transfRef = collection(db, 'artifacts', customAppId, 'users', state.user.uid, 'transferencias');

      // Arrays temporários para não sobrescrever um ao outro durante carregamento
      let acompData = [];
      let transfData = [];

      const mergeRecords = () => {
        state.records = [...acompData, ...transfData].sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
        if (state.currentScreen === 'visualizar') renderCalendar();
        if (state.currentScreen === 'alterar') renderRecordsList();
      };

      unsubAcomp = onSnapshot(acompRef, (snap) => {
        acompData = [];
        snap.forEach(doc => Object.keys(doc.data()).length > 0 && acompData.push({ id: doc.id, type: 'acompanhante', ...doc.data() }));
        mergeRecords();
      });

      unsubTransf = onSnapshot(transfRef, (snap) => {
        transfData = [];
        snap.forEach(doc => Object.keys(doc.data()).length > 0 && transfData.push({ id: doc.id, type: 'transferencia', ...doc.data() }));
        mergeRecords();
      });
    }

    // --- NAVEGAÇÃO E RENDERIZAÇÃO ---
    window.app = {}; // Objeto global para acesso do HTML inline

    window.app.showScreen = (screenId) => {
      document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
      document.getElementById(`screen-${screenId}`).classList.remove('hidden');
      state.currentScreen = screenId;

      // Header Global
      const header = document.getElementById('global-header');
      const headerTitle = document.getElementById('header-title');
      
      if (screenId === 'home') {
        header.classList.add('hidden');
        resetForms();
      } else {
        header.classList.remove('hidden');
        if(screenId === 'acompanhante') headerTitle.innerText = state.editingId ? 'Editar Acompanhante' : 'Novo Acompanhante';
        if(screenId === 'transferencia') headerTitle.innerText = state.editingId ? 'Editar Transferência' : 'Nova Transferência';
        if(screenId === 'visualizar') { headerTitle.innerText = 'Agenda da Semana'; renderCalendar(); }
        if(screenId === 'alterar') { headerTitle.innerText = 'Alterar Registros'; renderRecordsList(); }
      }

      // Preparação Específica das Telas de Form
      if (screenId === 'acompanhante' && !state.editingId) updateAcompDisplay();
      if (screenId === 'transferencia' && !state.editingId) updateTransfDisplay();
    };

    function resetForms() {
      state.editingId = null;
      state.editingType = null;
      state.baseDateAcomp = new Date();
      state.baseDateTransf = new Date();
      
      // Limpar Inputs Acompanhante
      document.getElementById('acomp-nome').value = '';
      document.getElementById('acomp-start-date').value = getFormatDateStr(state.baseDateAcomp);
      document.getElementById('acomp-start-time').value = '08:00';
      document.getElementById('acomp-end-date').value = getFormatDateStr(state.baseDateAcomp);
      document.getElementById('acomp-end-time').value = '18:00';
      document.getElementById('acomp-swipe-area').classList.remove('hidden');
      document.getElementById('acomp-edit-date-wrapper').classList.add('hidden');
      document.getElementById('btn-delete-acomp').classList.add('hidden');
      document.getElementById('btn-save-acomp-text').innerText = 'Salvar Registro';

      // Limpar Inputs Transferência
      document.getElementById('transf-visita').value = '';
      document.getElementById('transf-retorna').value = '';
      document.getElementById('transf-transporte').value = '';
      document.getElementById('transf-horario').value = '10:00';
      document.getElementById('transf-date').value = getFormatDateStr(state.baseDateTransf);
      document.getElementById('transf-swipe-area').classList.remove('hidden');
      document.getElementById('transf-edit-date-wrapper').classList.add('hidden');
      document.getElementById('btn-delete-transf').classList.add('hidden');
      document.getElementById('btn-save-transf-text').innerText = 'Salvar Registro';
    }

    // --- LÓGICA DE SWIPE (DATAS) ---
    function setupSwipe(elementId, callback) {
      const el = document.getElementById(elementId);
      if(!el) return;
      let startY = 0; let startX = 0;
      el.addEventListener('touchstart', e => { startY = e.touches[0].clientY; startX = e.touches[0].clientX; }, {passive: true});
      el.addEventListener('touchend', e => {
        const diffY = startY - e.changedTouches[0].clientY;
        const diffX = startX - e.changedTouches[0].clientX;
        
        // Verifica se é swipe vertical ou horizontal baseado no ID
        if(elementId.includes('swipe-area') && Math.abs(diffY) > 50 && Math.abs(diffY) > Math.abs(diffX)) {
           callback(diffY > 0 ? 1 : -1);
        } else if (elementId === 'cal-swipe-area' && Math.abs(diffX) > 50) {
           callback(diffX > 0 ? 7 : -7);
        }
      });
    }

    setupSwipe('acomp-swipe-area', (dir) => {
      state.baseDateAcomp.setDate(state.baseDateAcomp.getDate() + dir);
      updateAcompDisplay();
    });

    setupSwipe('transf-swipe-area', (dir) => {
      state.baseDateTransf.setDate(state.baseDateTransf.getDate() + dir);
      updateTransfDisplay();
    });

    setupSwipe('cal-swipe-area', (dir) => {
      window.app.changeWeek(dir);
    });

    function updateAcompDisplay() {
      const dateStr = getFormatDateStr(state.baseDateAcomp);
      document.getElementById('acomp-date-display').innerText = formatDisplayDate(dateStr);
      document.getElementById('acomp-start-date').value = dateStr;
      document.getElementById('acomp-end-date').value = dateStr;
    }

    function updateTransfDisplay() {
      const dateStr = getFormatDateStr(state.baseDateTransf);
      document.getElementById('transf-date-display').innerText = formatDisplayDate(dateStr);
      document.getElementById('transf-date').value = dateStr;
    }

    window.app.changeWeek = (days) => {
      state.weekStart.setDate(state.weekStart.getDate() + days);
      renderCalendar();
    };

    // --- OPERAÇÕES CRUD FIREBASE ---
    async function saveToFirestore(collectionName, data) {
      if(!state.user) return;
      try {
        const ref = collection(db, 'artifacts', customAppId, 'users', state.user.uid, collectionName);
        
        // Forçar Maiúsculas em textos
        const dadosTratados = Object.keys(data).reduce((acc, key) => {
          if (key !== 'id' && key !== 'type' && typeof data[key] === 'string' && !key.toLowerCase().includes('date') && !key.toLowerCase().includes('time') && !key.toLowerCase().includes('horario')) {
             acc[key] = data[key].toUpperCase();
          } else {
             acc[key] = data[key];
          }
          return acc;
        }, {});
