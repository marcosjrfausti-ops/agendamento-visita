<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gestão de Agendamentos</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #f3f4f6;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .vertical-text {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }
    input.uppercase-input { text-transform: uppercase; }
  </style>
</head>
<body class="text-gray-900 font-sans">

  <div class="min-h-screen max-w-md mx-auto bg-gray-50 flex flex-col relative overflow-hidden shadow-2xl sm:rounded-3xl sm:my-4 sm:border sm:border-gray-200">
    
    <div id="global-header" class="hidden bg-white border-b border-gray-200 px-4 py-4 flex items-center justify-between z-40 sticky top-0 shadow-sm">
      <button onclick="app.showScreen('home')" class="p-2 -ml-2 rounded-full hover:bg-gray-100 text-gray-700 transition-colors">
        <i data-lucide="arrow-left"></i>
      </button>
      <h2 id="header-title" class="text-red-600 font-bold text-xl text-center flex-1">Título</h2>
      <div class="w-8"></div>
    </div>

    <div class="flex-1 overflow-y-auto hide-scrollbar bg-gray-50 relative" id="main-content">
      
      <div id="screen-home" class="screen h-full p-6 flex flex-col justify-center space-y-6">
        <div class="text-center mb-8">
          <h2 class="text-red-600 font-bold text-3xl mb-2">Painel de Gestão</h2>
          <p class="text-gray-500 font-medium text-sm">Controle de Agendamentos</p>
        </div>

        <div class="grid grid-cols-1 gap-4">
          <button onclick="app.showScreen('acompanhante')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 hover:shadow-md hover:border-red-200 transition-all active:scale-95">
            <div class="bg-red-50 p-3 rounded-full text-red-600"><i data-lucide="users"></i></div>
            <span class="text-lg font-semibold text-gray-800 flex-1 text-left">Acompanhante</span>
          </button>

          <button onclick="app.showScreen('transferencia')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 hover:shadow-md hover:border-red-200 transition-all active:scale-95">
            <div class="bg-blue-50 p-3 rounded-full text-blue-600"><i data-lucide="arrow-right-left"></i></div>
            <span class="text-lg font-semibold text-gray-800 flex-1 text-left">Transferência</span>
          </button>

          <button onclick="app.showScreen('visualizar')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 hover
