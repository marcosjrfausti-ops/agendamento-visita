<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gestão de Agendamentos</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #f3f4f6;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .vertical-text {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }
    /* inputs automáticos em maiúsculo na digitação */
    input.uppercase-input { text-transform: uppercase; }
  </style>
</head>
<body class="text-gray-900 font-sans">

  <div class="min-h-screen max-w-md mx-auto bg-gray-50 flex flex-col relative overflow-hidden shadow-2xl sm:rounded-3xl sm:my-4 sm:border sm:border-gray-200">
    
    <div id="global-header" class="hidden bg-white border-b border-gray-200 px-4 py-4 flex items-center justify-between z-40 sticky top-0 shadow-sm">
      <button onclick="app.showScreen('home')" class="p-2 -ml-2 rounded-full hover:bg-gray-100 text-gray-700 transition-colors">
        <i data-lucide="arrow-left"></i>
      </button>
      <h2 id="header-title" class="text-red-600 font-bold text-xl text-center flex-1">Título</h2>
      <div class="w-8"></div>
    </div>

    <div class="flex-1 overflow-y-auto hide-scrollbar bg-gray-50 relative" id="main-content">
      
      <div id="screen-home" class="screen h-full p-6 flex flex-col justify-center space-y-6">
        <div class="text-center mb-8">
          <h2 class="text-red-600 font-bold text-3xl mb-2">Painel de Gestão</h2>
          <p class="text-gray-500 font-medium text-sm">Controle de Agendamentos</p>
        </div>

        <div class="grid grid-cols-1 gap-4">
          <button onclick="app.showScreen('acompanhante')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 hover:shadow-md hover:border-red-200 transition-all active:scale-95">
            <div class="bg-red-50 p-3 rounded-full text-red-600"><i data-lucide="users"></i></div>
            <span class="text-lg font-semibold text-gray-800 flex-1 text-left">Acompanhante</span>
          </button>

          <button onclick="app.showScreen('transferencia')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 hover:shadow-md hover:border-red-200 transition-all active:scale-95">
            <div class="bg-blue-50 p-3 rounded-full text-blue-600"><i data-lucide="arrow-right-left"></i></div>
            <span class="text-lg font-semibold text-gray-800 flex-1 text-left">Transferência</span>
          </button>

          <button onclick="app.showScreen('visualizar')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 hover:shadow-md hover:border-red-200 transition-all active:scale-95">
            <div class="bg-amber-50 p-3 rounded-full text-amber-600"><i data-lucide="calendar-days"></i></div>
            <span class="text-lg font-semibold text-gray-800 flex-1 text-left">Visualizar Semana</span>
          </button>

          <button onclick="app.showScreen('alterar')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 hover:shadow-md hover:border-red-200 transition-all active:scale-95">
            <div class="bg-emerald-50 p-3 rounded-full text-emerald-600"><i data-lucide="edit"></i></div>
            <span class="text-lg font-semibold text-gray-800 flex-1 text-left">Alterar Registro</span>
          </button>
        </div>

        <div class="mt-8 flex justify-center">
          <button onclick="app.generatePDF()" id="btn-pdf" class="flex items-center space-x-2 text-sm text-gray-500 bg-gray-100 px-4 py-2 rounded-full hover:bg-gray-200 transition-colors">
            <i data-lucide="download" class="w-4 h-4"></i>
            <span id="btn-pdf-text">Baixar Relatório (PDF)</span>
          </button>
        </div>
      </div>

      <div id="screen-acompanhante" class="screen hidden h-full flex flex-col space-y-6">
        <div id="acomp-date-area" class="bg-red-600 text-white p-5 pb-6 rounded-b-[40px] shadow-md flex items-center justify-between select-none">
          <button onclick="app.changeAcompDate(-1)" class="p-2 bg-red-700/50 hover:bg-red-700 rounded-full active:scale-90 transition-all">
            <i data-lucide="chevron-left" class="w-6 h-6"></i>
          </button>
          
          <div class="flex flex-col items-center flex-1 px-2">
            <span class="text-[10px] font-medium opacity-80 uppercase tracking-widest mb-1">Data Selecionada</span>
            <h1 id="acomp-date-display" class="text-xl font-bold text-center leading-tight">Carregando...</h1>
          </div>

          <button onclick="app.changeAcompDate(1)" class="p-2 bg-red-700/50 hover:bg-red-700 rounded-full active:scale-90 transition-all">
            <i data-lucide="chevron-right" class="w-6 h-6"></i>
          </button>
        </div>

        <div class="flex-1 px-4 space-y-4 pt-4">
          <div id="acomp-edit-date-wrapper" class="hidden">
             <div class="flex flex-row items-center justify-between bg-white p-3 rounded-xl shadow-sm border border-gray-100 w-full mb-4">
                <span class="text-gray-700 font-medium">Data Ref.</span>
                <input type="date" id="acomp-input-basedate" class="bg-transparent border-b border-gray-200 focus:border-red-500 outline-none text-right font-semibold text-gray-900 w-fit">
             </div>
          </div>

          <div class="flex flex-row items-center justify-between bg-white p-3 rounded-xl shadow-sm border border-gray-100 w-full">
            <div class="flex items-center space-x-2 whitespace-nowrap text-gray-700 font-medium">
              <i data-lucide="users" class="w-4 h-4 text-gray-400"></i><span>Acompanhante</span>
            </div>
            <input type="text" id="acomp-nome" placeholder="NOME" class="uppercase-input bg-transparent border-b border-gray-200 focus:border-red-500 outline-none text-right font-semibold text-gray-900 w-full ml-2">
          </div>

          <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 space-y-3">
            <h2 class="text-red-600 font-bold text-sm">Início</h2>
            <div class="flex space-x-2">
              <div class="flex flex-row items-center justify-between bg-gray-50 p-2 rounded-lg flex-1">
                <span class="text-gray-600 text-sm">Data</span>
                <input type="date" id="acomp-start-date" class="bg-transparent outline-none text-right font-semibold text-gray-900 w-fit text-sm">
              </div>
              <div class="flex flex-row items-center justify-between bg-gray-50 p-2 rounded-lg flex-1">
                <span class="text-gray-600 text-sm">Hora</span>
                <input type="time" id="acomp-start-time" class="bg-transparent outline-none text-right font-semibold text-gray-900 w-fit text-sm">
              </div>
            </div>
          </div>

          <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 space-y-3">
            <h2 class="text-red-600 font-bold text-sm">Fim</h2>
            <div class="flex space-x-2">
              <div class="flex flex-row items-center justify-between bg-gray-50 p-2 rounded-lg flex-1">
                <span class="text-gray-600 text-sm">Data</span>
                <input type="date" id="acomp-end-date" class="bg-transparent outline-none text-right font-semibold text-gray-900 w-fit text-sm">
              </div>
              <div class="flex flex-row items-center justify-between bg-gray-50 p-2 rounded-lg flex-1">
                <span class="text-gray-600 text-sm">Hora</span>
                <input type="time" id="acomp-end-time" class="bg-transparent outline-none text-right font-semibold text-gray-900 w-fit text-sm">
              </div>
            </div>
          </div>
        </div>

        <div class="p-4 bg-white border-t border-gray-100 flex space-x-3 pb-8">
          <button id="btn-delete-acomp" onclick="app.deleteCurrentRecord()" class="hidden bg-gray-100 text-red-600 font-bold py-3 px-4 rounded-xl shadow-sm">Excluir</button>
          <button onclick="app.saveAcompanhante()" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-xl shadow-md flex items-center justify-center space-x-2 transition-colors">
            <i data-lucide="save"></i>
            <span id="btn-save-acomp-text">Salvar Registro</span>
          </button>
        </div>
      </div>

      <div id="screen-transferencia" class="screen hidden h-full flex flex-col space-y-6">
        <div id="transf-date-area" class="bg-blue-600 text-white p-5 pb-6 rounded-b-[40px] shadow-md flex items-center justify-between select-none">
          <button onclick="app.changeTransfDate(-1)" class="p-2 bg-blue-700/50 hover:bg-blue-700 rounded-full active:scale-90 transition-all">
            <i data-lucide="chevron-left" class="w-6 h-6"></i>
          </button>
          
          <div class="flex flex-col items-center flex-1 px-2">
            <span class="text-[10px] font-medium opacity-80 uppercase tracking-widest mb-1">Data Selecionada</span>
            <h1 id="transf-date-display" class="text-xl font-bold text-center leading-tight">Carregando...</h1>
          </div>

          <button onclick="app.changeTransfDate(1)" class="p-2 bg-blue-700/50 hover:bg-blue-700 rounded-full active:scale-90 transition-all">
            <i data-lucide="chevron-right" class="w-6 h-6"></i>
          </button>
        </div>

        <div class="flex-1 px-4 space-y-4 pt-4">
          <div id="transf-edit-date-wrapper" class="hidden">
             <div class="flex flex-row items-center justify-between bg-white p-3 rounded-xl shadow-sm border border-gray-100 w-full mb-4">
                <span class="text-gray-700 font-medium">Data</span>
                <input type="date" id="transf-date" class="bg-transparent border-b border-gray-200 focus:border-blue-500 outline-none text-right font-semibold text-gray-900 w-fit">
             </div>
          </div>

          <div class="flex flex-row items-center justify-between bg-white p-3 rounded-xl shadow-sm border border-gray-100 w-full">
            <div class="flex items-center space-x-2 whitespace-nowrap text-gray-700 font-medium">
              <i data-lucide="users" class="w-4 h-4 text-gray-400"></i><span>Visita</span>
            </div>
            <input type="text" id="transf-visita" placeholder="NOME DA PESSOA" class="uppercase-input bg-transparent border-b border-gray-200 focus:border-blue-500 outline-none text-right font-semibold text-gray-900 w-full ml-2">
          </div>

          <div class="flex flex-row items-center justify-between bg-white p-3 rounded-xl shadow-sm border border-gray-100 w-full">
            <div class="flex items-center space-x-2 whitespace-nowrap text-gray-700 font-medium">
              <i data-lucide="users" class="w-4 h-4 text-gray-400"></i><span>Retorna</span>
            </div>
            <input type="text" id="transf-retorna" placeholder="NOME DA PESSOA" class="uppercase-input bg-transparent border-b border-gray-200 focus:border-blue-500 outline-none text-right font-semibold text-gray-900 w-full ml-2">
          </div>

          <div class="flex space-x-2 items-center bg-white p-3 rounded-xl shadow-sm border border-gray-100">
            <div class="flex items-center space-x-2 text-gray-700 font-medium whitespace-nowrap">
              <i data-lucide="truck" class="w-4 h-4 text-gray-400"></i><span>Transp.</span>
            </div>
            <input type="text" id="transf-transporte" placeholder="NOME DO MOTORISTA" class="uppercase-input bg-transparent border-b border-gray-200 focus:border-blue-500 outline-none text-center font-semibold text-gray-900 w-full mx-2">
            <div class="flex items-center space-x-1">
               <i data-lucide="clock" class="w-4 h-4 text-gray-400"></i>
               <input type="time" id="transf-horario" class="bg-transparent border-b border-gray-200 focus:border-blue-500 outline-none text-right font-semibold text-gray-900 w-fit">
            </div>
          </div>
        </div>

        <div class="p-4 bg-white border-t border-gray-100 flex space-x-3 pb-8">
          <button id="btn-delete-transf" onclick="app.deleteCurrentRecord()" class="hidden bg-gray-100 text-red-600 font-bold py-3 px-4 rounded-xl shadow-sm">Excluir</button>
          <button onclick="app.saveTransferencia()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md flex items-center justify-center space-x-2 transition-colors">
            <i data-lucide="save"></i>
            <span id="btn-save-transf-text">Salvar Registro</span>
          </button>
        </div>
      </div>

      <div id="screen-visualizar" class="screen hidden h-full flex flex-col bg-white relative">
        <div class="sticky top-0 z-30 flex flex-col shadow-sm">
          <div class="bg-amber-100 p-2 text-center border-b border-amber-200 flex items-center justify-between px-2 select-none">
            <button onclick="app.changeWeek(-7)" class="text-amber-700 font-bold text-xl px-3 py-1">&lsaquo;</button>
            <div class="flex flex-col items-center">
               <span class="text-[10px] font-semibold text-amber-700 uppercase tracking-widest block">Semana de</span>
               <h2 id="cal-week-label" class="text-sm font-bold text-gray-900">...</h2>
            </div>
            <button onclick="app.changeWeek(7)" class="text-amber-700 font-bold text-xl px-3 py-1">&rsaquo;</button>
          </div>
          
          <div id="cal-days-header" class="flex border-b border-gray-200 bg-gray-50">
             </div>
        </div>

        <div class="flex-1 overflow-y-auto pb-10 hide-scrollbar bg-white">
          <div class="flex relative" style="height: 1440px;" id="cal-grid-body">
            </div>
        </div>
      </div>

      <div id="screen-alterar" class="screen hidden pb-10 p-4 space-y-4">
        <p class="text-sm text-gray-500 text-center mb-4 mt-2">Toque em qualquer registro para alterar ou excluir.</p>
        <div id="records-list" class="space-y-4">
          </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    window.app = {};

    const state = {
      user: null,
      records: [],
      currentScreen: 'home',
      baseDateAcomp: new Date(),
      baseDateTransf: new Date(),
      weekStart: new Date(),
      editingId: null,
      editingType: null
    };
    state.weekStart = getMonday(new Date());

    window.app.showScreen = (screenId) => {
      document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
      const targetScreen = document.getElementById(`screen-${screenId}`);
      if (targetScreen) targetScreen.classList.remove('hidden');
      state.currentScreen = screenId;

      const header = document.getElementById('global-header');
      const headerTitle = document.getElementById('header-title');
      
      if (screenId === 'home') {
        if (header) header.classList.add('hidden');
        resetForms();
      } else {
        if (header) header.classList.remove('hidden');
        if (headerTitle) {
          if(screenId === 'acompanhante') headerTitle.innerText = state.editingId ? 'Editar Acompanhante' : 'Novo Acompanhante';
          if(screenId === 'transferencia') headerTitle.innerText = state.editingId ? 'Editar Transferência' : 'Nova Transferência';
          if(screenId === 'visualizar') { headerTitle.innerText = 'Agenda da Semana'; renderCalendar(); }
          if(screenId === 'alterar') { headerTitle.innerText = 'Alterar Registros'; renderRecordsList(); }
        }
      }

      if (screenId === 'acompanhante' && !state.editingId) updateAcompDisplay();
      if (screenId === 'transferencia' && !state.editingId) updateTransfDisplay();
    };

    const firebaseConfig = {
      apiKey: "AIzaSyBtHyDxJFLIyFplyaDeTlidDdXN6IzCh8s",
      authDomain: "agendamento-visita.firebaseapp.com",
      projectId: "agendamento-visita",
      storageBucket: "agendamento-visita.firebasestorage.app",
      messagingSenderId: "70182665963",
      appId: "1:70182665963:web:dc14507ed95e64d1a208ae",
      measurementId: "G-KHSC00WT83"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    
    let db;
    try {
      db = initializeFirestore(firebaseApp, {
        localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
      });
    } catch (cacheErr) {
      console.warn("Falha ao iniciar cache persistente, usando Firestore padrão:", cacheErr);
      db = getFirestore(firebaseApp);
    }
    const customAppId = 'agendamento-visita';

    function getFormatDateStr(dateObj) {
      const yyyy = dateObj.getFullYear();
      const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
      const dd = String(dateObj.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function formatDisplayDate(dateStr) {
      if (!dateStr) return '';
      const [yyyy, mm, dd] = dateStr.split('-');
      const date = new Date(yyyy, mm - 1, dd);
      const dias = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
      return `${dias[date.getDay()]}, ${dd}/${mm}/${yyyy}`;
    }

    function getMonday(d) {
      const date = new Date(d);
      const day = date.getDay();
      const diff = date.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(date.getFullYear(), date.getMonth(), diff);
    }

    if (window.lucide) lucide.createIcons();

    async function initAuth() {
      try {
        await signInAnonymously(auth);
      } catch (err) {
        console.error("Erro auth:", err);
        state.user = { uid: 'offline-local-user' };
        setupFirestoreListeners();
      }
    }

    onAuthStateChanged(auth, (u) => {
      state.user = u || { uid: 'offline-local-user' };
      setupFirestoreListeners();
    });

    let unsubAcomp = null;
    let unsubTransf = null;

    function setupFirestoreListeners() {
      if (!state.user || !db) return;
      if (unsubAcomp) unsubAcomp();
      if (unsubTransf) unsubTransf();

      const acompRef = collection(db, 'artifacts', customAppId, 'users', state.user.uid, 'acompanhantes');
      const transfRef = collection(db, 'artifacts', customAppId, 'users', state.user.uid, 'transferencias');

      let acompData = [];
      let transfData = [];

      const mergeRecords = () => {
        state.records = [...acompData, ...transfData].sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
        if (state.currentScreen === 'visualizar') renderCalendar();
        if (state.currentScreen === 'alterar') renderRecordsList();
      };

      unsubAcomp = onSnapshot(acompRef, (snap) => {
        acompData = [];
        snap.forEach(doc => Object.keys(doc.data()).length > 0 && acompData.push({ id: doc.id, type: 'acompanhante', ...doc.data() }));
        mergeRecords();
      }, (err) => console.error("Erro snapshot acompanhantes:", err));

      unsubTransf = onSnapshot(transfRef, (snap) => {
        transfData = [];
        snap.forEach(doc => Object.keys(doc.data()).length > 0 && transfData.push({ id: doc.id, type: 'transferencia', ...doc.data() }));
        mergeRecords();
      }, (err) => console.error("Erro snapshot transferencias:", err));
    }

    function resetForms() {
      state.editingId = null;
      state.editingType = null;
      state.baseDateAcomp = new Date();
      state.baseDateTransf = new Date();
      
      const acompNome = document.getElementById('acomp-nome');
      if (acompNome) acompNome.value = '';
      
      const acompStartDate = document.getElementById('acomp-start-date');
      if (acompStartDate) acompStartDate.value = getFormatDateStr(state.baseDateAcomp);
      
      const acompStartTime = document.getElementById('acomp-start-time');
      if (acompStartTime) acompStartTime.value = '08:00';
      
      const acompEndDate = document.getElementById('acomp-end-date');
      if (acompEndDate) acompEndDate.value = getFormatDateStr(state.baseDateAcomp);
      
      const acompEndTime = document.getElementById('acomp-end-time');
      if (acompEndTime) acompEndTime.value = '18:00';
      
      const acompDateArea = document.getElementById('acomp-date-area');
      if (acompDateArea) acompDateArea.classList.remove('hidden');
      
      const acompEditDate = document.getElementById('acomp-edit-date-wrapper');
      if (acompEditDate) acompEditDate.classList.add('hidden');
      
      const btnDelAcomp = document.getElementById('btn-delete-acomp');
      if (btnDelAcomp) btnDelAcomp.classList.add('hidden');
      
      const btnSaveAcompText = document.getElementById('btn-save-acomp-text');
      if (btnSaveAcompText) btnSaveAcompText.innerText = 'Salvar Registro';

      const transfVisita = document.getElementById('transf-visita');
      if (transfVisita) transfVisita.value = '';
      
      const transfRetorna = document.getElementById('transf-retorna');
      if (transfRetorna) transfRetorna.value = '';
      
      const transfTransporte = document.getElementById('transf-transporte');
      if (transfTransporte) transfTransporte.value = '';
      
      const transfHorario = document.getElementById('transf-horario');
      if (transfHorario) transfHorario.value = '10:00';
      
      const transfDate = document.getElementById('transf-date');
      if (transfDate) transfDate.value = getFormatDateStr(state.baseDateTransf);
      
      const transfDateArea = document.getElementById('transf-date-area');
      if (transfDateArea) transfDateArea.classList.remove('hidden');
      
      const transfEditDate = document.getElementById('transf-edit-date-wrapper');
      if (transfEditDate) transfEditDate.classList.add('hidden');
      
      const btnDelTransf = document.getElementById('btn-delete-transf');
      if (btnDelTransf) btnDelTransf.classList.add('hidden');
      
      const btnSaveTransfText = document.getElementById('btn-save-transf-text');
      if (btnSaveTransfText) btnSaveTransfText.innerText = 'Salvar Registro';
    }

    // --- LÓGICA DE BOTÕES (SUBSTITUI O SWIPE) ---
    window.app.changeAcompDate = (dir) => {
      state.baseDateAcomp.setDate(state.baseDateAcomp.getDate() + dir);
      updateAcompDisplay();
    };

    window.app.changeTransfDate = (dir) => {
      state.baseDateTransf.setDate(state.baseDateTransf.getDate() + dir);
      updateTransfDisplay();
    };

    window.app.changeWeek = (days) => {
      state.weekStart.setDate(state.weekStart.getDate() + days);
      renderCalendar();
    };

    function updateAcompDisplay() {
      const dateStr = getFormatDateStr(state.baseDateAcomp);
      const display = document.getElementById('acomp-date-display');
      if (display) display.innerText = formatDisplayDate(dateStr);
      const start = document.getElementById('acomp-start-date');
      if (start) start.value = dateStr;
      const end = document.getElementById('acomp-end-date');
      if (end) end.value = dateStr;
    }

    function updateTransfDisplay() {
      const dateStr = getFormatDateStr(state.baseDateTransf);
      const display = document.getElementById('transf-date-display');
      if (display) display.innerText = formatDisplayDate(dateStr);
      const tDate = document.getElementById('transf-date');
      if (tDate) tDate.value = dateStr;
    }

    async function saveToFirestore(collectionName, data) {
      if(!state.user || !db) return;
      try {
        const ref = collection(db, 'artifacts', customAppId, 'users', state.user.uid, collectionName);
        
        const dadosTratados = Object.keys(data).reduce((acc, key) => {
          if (key !== 'id' && key !== 'type' && typeof data[key] === 'string' && !key.toLowerCase().includes('date') && !key.toLowerCase().includes('time') && !key.toLowerCase().includes('horario')) {
             acc[key] = data[key].toUpperCase();
          } else {
             acc[key] = data[key];
          }
          return acc;
        }, {});

        if (state.editingId) {
          dadosTratados.updatedAt = new Date().toISOString();
          await updateDoc(doc(ref, state.editingId), dadosTratados);
        } else {
          dadosTratados.createdAt = new Date().toISOString();
          await setDoc(doc(ref, crypto.randomUUID()), dadosTratados);
        }
        window.app.showScreen('home');
      } catch(e) {
        console.error("Erro salvando:", e);
        alert("Erro ao salvar. Tente novamente.");
      }
    }

    window.app.saveAcompanhante = () => {
      const nomeInput = document.getElementById('acomp-nome');
      const nome = nomeInput ? nomeInput.value.trim() : '';
      if(!nome) return alert("Preencha o nome.");
      
      const baseDateWrapper = document.getElementById('acomp-input-basedate');
      const startDateInput = document.getElementById('acomp-start-date');
      const startTimeInput = document.getElementById('acomp-start-time');
      const endDateInput = document.getElementById('acomp-end-date');
      const endTimeInput = document.getElementById('acomp-end-time');

      const data = {
        type: 'acompanhante',
        acompanhante: nome,
        startDate: (state.editingId && baseDateWrapper ? baseDateWrapper.value : (startDateInput ? startDateInput.value : '')),
        startTime: startTimeInput ? startTimeInput.value : '08:00',
        endDate: endDateInput ? endDateInput.value : '',
        endTime: endTimeInput ? endTimeInput.value : '18:00'
      };
      
      if(state.editingId && baseDateWrapper) data.startDate = baseDateWrapper.value;

      saveToFirestore('acompanhantes', data);
    };

    window.app.saveTransferencia = () => {
      const visitaInput = document.getElementById('transf-visita');
      const retornaInput = document.getElementById('transf-retorna');
      const transporteInput = document.getElementById('transf-transporte');
      const horarioInput = document.getElementById('transf-horario');
      const dateInput = document.getElementById('transf-date');

      const visita = visitaInput ? visitaInput.value.trim() : '';
      const retorna = retornaInput ? retornaInput.value.trim() : '';
      if(!visita || !retorna) return alert("Preencha Visita e Retorno.");

      const data = {
        type: 'transferencia',
        date: dateInput ? dateInput.value : '',
        visita: visita,
        retorna: retorna,
        transporte: transporteInput ? transporteInput.value : '',
        horario: horarioInput ? horarioInput.value : '10:00'
      };
      saveToFirestore('transferencias', data);
    };

    window.app.deleteCurrentRecord = async () => {
      if(!state.user || !state.editingId || !db || !confirm("Deseja realmente excluir este registro?")) return;
      try {
        const col = state.editingType === 'acompanhante' ? 'acompanhantes' : 'transferencias';
        await deleteDoc(doc(db, 'artifacts', customAppId, 'users', state.user.uid, col, state.editingId));
        window.app.showScreen('home');
      } catch(e) {
        console.error("Erro excluindo:", e);
      }
    };

    window.app.editRecord = (id) => {
      const rec = state.records.find(r => r.id === id);
      if(!rec) return;

      state.editingId = rec.id;
      state.editingType = rec.type;

      if(rec.type === 'acompanhante') {
        document.getElementById('acomp-date-area').classList.add('hidden');
        document.getElementById('acomp-edit-date-wrapper').classList.remove('hidden');
        document.getElementById('btn-delete-acomp').classList.remove('hidden');
        document.getElementById('btn-save-acomp-text').innerText = 'Atualizar';
        
        document.getElementById('acomp-input-basedate').value = rec.startDate;
        document.getElementById('acomp-nome').value = rec.acompanhante;
        document.getElementById('acomp-start-date').value = rec.startDate;
        document.getElementById('acomp-start-time').value = rec.startTime;
        document.getElementById('acomp-end-date').value = rec.endDate;
        document.getElementById('acomp-end-time').value = rec.endTime;
        
        window.app.showScreen('acompanhante');
      } else {
        document.getElementById('transf-date-area').classList.add('hidden');
        document.getElementById('transf-edit-date-wrapper').classList.remove('hidden');
        document.getElementById('btn-delete-transf').classList.remove('hidden');
        document.getElementById('btn-save-transf-text').innerText = 'Atualizar';

        document.getElementById('transf-date').value = rec.date;
        document.getElementById('transf-visita').value = rec.visita;
        document.getElementById('transf-retorna').value = rec.retorna;
        document.getElementById('transf-transporte').value = rec.transporte;
        document.getElementById('transf-horario').value = rec.horario;

        window.app.showScreen('transferencia');
      }
    };

    function renderRecordsList() {
      const list = document.getElementById('records-list');
      if (!list) return;
      if(state.records.length === 0) {
        list.innerHTML = `<div class="text-center text-gray-400 mt-10">Nenhum registro encontrado.</div>`;
        return;
      }

      let html = '';
      state.records.forEach(r => {
        if(r.type === 'acompanhante') {
          html += `
            <div onclick="app.editRecord('${r.id}')" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col space-y-2 active:scale-95 transition-transform cursor-pointer">
              <div class="flex justify-between items-center">
                <span class="text-xs font-bold text-red-600 bg-red-50 px-2 py-1 rounded">ACOMPANHANTE</span>
                <span class="text-xs text-gray-400">${formatDisplayDate(r.startDate)}</span>
              </div>
              <h2 class="text-red-600 font-bold text-lg text-gray-900">${r.acompanhante}</h2>
              <div class="text-sm text-gray-600 flex justify-between">
                <span>Início: ${r.startTime}</span>
                <span>Fim: ${r.endDate !== r.startDate ? formatDisplayDate(r.endDate) : ''} ${r.endTime}</span>
              </div>
            </div>`;
        } else {
          html += `
            <div onclick="app.editRecord('${r.id}')" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col space-y-2 active:scale-95 transition-transform cursor-pointer">
              <div class="flex justify-between items-center">
                <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">TRANSFERÊNCIA</span>
                <span class="text-xs text-gray-400">${formatDisplayDate(r.date)}</span>
              </div>
              <h2 class="text-red-600 font-bold text-lg text-gray-900 line-clamp-1">${r.visita} &rarr; ${r.retorna}</h2>
              <div class="text-sm text-gray-600 flex space-x-4">
                <span><i data-lucide="truck" class="inline w-4 h-4 mr-1"></i> ${r.transporte}</span>
                <span><i data-lucide="clock" class="inline w-4 h-4 mr-1"></i> ${r.horario}</span>
              </div>
            </div>`;
        }
      });
      list.innerHTML = html;
      if (window.lucide) lucide.createIcons();
    }

    const shortDays = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
    function renderCalendar() {
      const gridBody = document.getElementById('cal-grid-body');
      if (!gridBody) return;
      
      const weekDates = Array.from({length: 7}).map((_, i) => {
        const d = new Date(state.weekStart);
        d.setDate(d.getDate() + i);
        return d;
      });

      const label = document.getElementById('cal-week-label');
      if (label) {
        label.innerText = `${String(weekDates[0].getDate()).padStart(2, '0')}/${String(weekDates[0].getMonth()+1).padStart(2, '0')} a ${String(weekDates[6].getDate()).padStart(2, '0')}/${String(weekDates[6].getMonth()+1).padStart(2, '0')}`;
      }

      let headerHtml = `<div class="w-10 shrink-0 border-r border-gray-200 bg-white"></div>`;
      const todayStr = new Date().toDateString();
      
      weekDates.forEach(d => {
        const isToday = d.toDateString() === todayStr;
        headerHtml += `
          <div class="flex-1 flex flex-col items-center py-1 border-r border-gray-100 text-[10px] ${isToday ? 'bg-amber-50' : ''}">
            <span class="font-medium ${isToday ? 'text-amber-600' : 'text-gray-500'}">${shortDays[d.getDay()]}</span>
            <span class="font-bold mt-[2px] ${isToday ? 'bg-amber-500 text-white rounded-full w-5 h-5 flex items-center justify-center shadow-sm' : 'text-gray-800'}">
              ${d.getDate()}
            </span>
          </div>`;
      });
      const daysHeader = document.getElementById('cal-days-header');
      if (daysHeader) daysHeader.innerHTML = headerHtml;

      let gridHtml = '';
      let linesHtml = '<div class="absolute inset-0 pointer-events-none z-0 flex flex-col">';
      let hoursColHtml = '<div class="w-10 shrink-0 relative border-r border-gray-200 bg-white z-10">';
      for(let h=0; h<24; h++) {
        linesHtml += `<div class="w-full border-t border-gray-100 shrink-0" style="height: 60px;"></div>`;
        hoursColHtml += `<div class="absolute w-full text-center text-[9px] text-gray-400 font-medium" style="top: ${h * 60 - 6}px">${String(h).padStart(2, '0')}h</div>`;
      }
      linesHtml += '</div>';
      hoursColHtml += '</div>';

      gridHtml += linesHtml + hoursColHtml;

      weekDates.forEach(dObj => {
        const dateStr = getFormatDateStr(dObj);
        const startOfDay = new Date(`${dateStr}T00:00:00`);
        const endOfDay = new Date(`${dateStr}T23:59:59`);
        const isToday = dObj.toDateString() === todayStr;

        let colHtml = `<div class="flex-1 relative border-r border-gray-100 z-10 ${isToday ? 'bg-amber-50 bg-opacity-20' : ''}">`;

        state.records.forEach(r => {
          if (r.type === 'acompanhante') {
             const rStart = new Date(`${r.startDate}T${r.startTime}`);
             const rEnd = new Date(`${r.endDate}T${r.endTime}`);
             if (rStart <= endOfDay && rEnd >= startOfDay) {
               const vStart = rStart < startOfDay ? startOfDay : rStart;
               const vEnd = rEnd > endOfDay ? endOfDay : rEnd;
               const topPx = (vStart.getHours() * 60) + vStart.getMinutes();
               const durMins = (vEnd - vStart) / 60000;
               const heightPx = durMins < 30 ? 30 : durMins;

               colHtml += `
                 <div class="absolute left-[2px] right-[2px] rounded bg-red-100 border border-red-300 shadow-sm flex items-center justify-center overflow-hidden opacity-90" style="top: ${topPx}px; height: ${heightPx}px;">
                   <span class="text-[10px] font-bold text-red-800 whitespace-nowrap overflow-hidden text-ellipsis px-1 vertical-text">
                     ${r.acompanhante}
                   </span>
                 </div>`;
             }
          } else if (r.date === dateStr) {
             const [hh, mm] = r.horario.split(':').map(Number);
             const topPx = (hh * 60) + mm;
             colHtml += `
               <div class="absolute left-[1px] right-[1px] z-20 flex flex-col items-center" style="top: ${topPx - 2}px;">
                 <div class="w-full h-[4px] bg-blue-700 rounded-full mb-[2px] shadow-sm"></div>
                 <div class="bg-blue-600 text-white rounded-sm py-1 shadow-md overflow-hidden flex flex-col items-center max-h-[80px]">
                   <span class="text-[9px] font-bold whitespace-nowrap overflow-hidden text-ellipsis vertical-text">
                     ${r.visita}
                   </span>
                 </div>
               </div>`;
          }
        });

        colHtml += '</div>';
        gridHtml += colHtml;
      });

      gridBody.innerHTML = gridHtml;
    }

    window.app.generatePDF = async () => {
      const btnText = document.getElementById('btn-pdf-text');
      if (btnText) btnText.innerText = 'Gerando PDF...';
      
      let coordsText = "GPS não capturado / Sem permissão";
      try {
        if (navigator.geolocation) {
          const position = await new Promise((resolve, reject) => navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 7000 }));
          coordsText = `Lat: ${position.coords.latitude.toFixed(6)}, Lng: ${position.coords.longitude.toFixed(6)}`;
        }
      } catch(e) { console.warn("GPS ignorado."); }

      if(!window.pdfMake) {
        if (btnText) btnText.innerText = 'Baixar Relatório (PDF)';
        return alert("PDFMake não carregado totalmente.");
      }

      const docDef = {
        content: [
          { text: 'RELATÓRIO DE AGENDAMENTOS', style: 'header', alignment: 'center' },
          { text: `Gerado em: ${new Date().toLocaleString()}`, alignment: 'center', margin: [0, 0, 0, 20] },
        ],
        footer: (currentPage, pageCount) => ({ text: `Página ${currentPage} de ${pageCount} | Geração: ${coordsText}`, alignment: 'center', fontSize: 8, margin: [0, 10, 0, 0] }),
        styles: { header: { fontSize: 18, bold: true, color: '#dc2626', margin: [0,0,0,10] }, subheader: { fontSize: 14, bold: true, margin: [0,10,0,5] }, item: { fontSize: 11, margin: [0,2,0,2] } }
      };

      state.records.forEach(r => {
        if(r.type === 'acompanhante') {
          docDef.content.push(
            { text: `Acompanhante: ${r.acompanhante}`, style: 'subheader' },
            { text: `Início: ${formatDisplayDate(r.startDate)} às ${r.startTime}`, style: 'item' },
            { text: `Fim: ${formatDisplayDate(r.endDate)} às ${r.endTime}`, style: 'item' },
            { canvas: [{ type: 'line', x1: 0, y1: 5, x2: 515, y2: 5, lineWidth: 1, lineColor: '#e5e7eb' }], margin: [0,10,0,10] }
          );
        } else {
          docDef.content.push(
            { text: `Transferência - Dia: ${formatDisplayDate(r.date)}`, style: 'subheader' },
            { text: `Visita: ${r.visita}`, style: 'item' },
            { text: `Retorno: ${r.retorna}`, style: 'item' },
            { text: `Transporte: ${r.transporte} | Horário: ${r.horario}`, style: 'item' },
            { canvas: [{ type: 'line', x1: 0, y1: 5, x2: 515, y2: 5, lineWidth: 1, lineColor: '#e5e7eb' }], margin: [0,10,0,10] }
          );
        }
      });

      pdfMake.createPdf(docDef).download('agendamentos.pdf');
      if (btnText) btnText.innerText = 'Baixar Relatório (PDF)';
    };

    initAuth();
  </script>
</body>
</html>
